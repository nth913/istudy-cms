worker_processes auto;
worker_rlimit_nofile 65535;

events {
  worker_connections 4096;
  multi_accept on;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;
  server_tokens off;

  client_max_body_size 100m;

  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;

  # Rate limit /api/health 60/min per IP
  limit_req_zone $binary_remote_addr zone=health:10m rate=60r/m;

  upstream cms_upstream {
    server cms:3000;
    keepalive 32;
  }

  # HTTP -> HTTPS redirect + ACME challenge
  server {
    listen 80;
    server_name h913.aistudy.com.vn;

    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    location / {
      return 301 https://$host$request_uri;
    }
  }

  # HTTPS server
  server {
    listen 443 ssl http2;
    server_name h913.aistudy.com.vn;

    ssl_certificate /etc/letsencrypt/live/h913.aistudy.com.vn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/h913.aistudy.com.vn/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location /api/health {
      limit_req zone=health burst=10 nodelay;
      proxy_pass http://cms_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Media files: allow framing from aistudy.com.vn (de-thi-chi-tiet + dap-an
    # iframes embed CMS PDFs cross-origin). Nginx add_header doesn't inherit
    # across location blocks — repeat all security headers we still want, but
    # drop X-Frame-Options and replace with CSP frame-ancestors.
    location ~ ^/api/media/file/ {
      proxy_pass http://cms_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

      add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
      add_header X-Content-Type-Options "nosniff" always;
      add_header Referrer-Policy "strict-origin-when-cross-origin" always;
      add_header Content-Security-Policy "frame-ancestors 'self' https://aistudy.com.vn https://www.aistudy.com.vn" always;
    }

    location / {
      proxy_pass http://cms_upstream;
      proxy_http_version 1.1;

      # WebSocket support (Payload admin live updates)
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";

      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

      proxy_connect_timeout 60s;
      proxy_send_timeout 60s;
      proxy_read_timeout 60s;
    }
  }
}
